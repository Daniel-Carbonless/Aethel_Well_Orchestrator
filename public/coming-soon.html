<!DOCTYPE html>
<html lang="es">
<head>

        </p>
        <button onclick="window.history.pushState({}, '', '/'); loadPage('/');" class="bg-primary text-white hover:bg-emerald-900 px-8 py-3 rounded-full font-bold shadow-lg transition-transform hover:-translate-y-1 flex items-center gap-2">
